    /* ── TOKENS ── */
    :root {
      --bg:          #F7F2EA;
      --surface:     #FDFAF5;
      --surface-alt: #EDE6D8;
      --primary:     #6B4423;
      --primary-mid: #8B5E3C;
      --secondary:   #C4A87A;
      --accent:      #C9922A;
      --accent-light:#F0D9A8;
      --text:        #2E1A0E;
      --muted:       #7A6248;
      --border:      #DDD0BB;
      --shadow:      rgba(46,26,14,.10);
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── HEADER ── */
    #site-header {
      background: var(--primary);
      color: #FAF7F2;
      padding: 18px 16px 14px;
      text-align: center;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 3px 14px rgba(0,0,0,.22);
    }
    #site-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: 3px;
      line-height: 1.15;
    }
    .tagline {
      font-size: .68rem;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--accent-light);
      margin-top: 3px;
      font-weight: 300;
    }
    .header-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 11px;
    }
    .pill-btn {
      border: 1.5px solid var(--secondary);
      color: var(--secondary);
      border-radius: 999px;
      padding: 5px 18px;
      font-size: .74rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      transition: background .18s, color .18s, border-color .18s;
    }
    .pill-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── CAT NAV ── */
    #cat-nav-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0; /* updated by JS */
      z-index: 199;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #cat-nav-wrap::-webkit-scrollbar { display: none; }
    #cat-nav {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      white-space: nowrap;
    }
    .cnav-btn {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: .76rem;
      font-weight: 700;
      color: var(--muted);
      transition: background .18s, color .18s;
      white-space: nowrap;
    }
    .cnav-btn:hover { background: var(--surface-alt); }
    .cnav-btn.active { background: var(--primary); color: #FAF7F2; }

    /* ── MAIN ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 14px 12px 56px;
    }

    /* ── SECTION HEADER ── */
    .cat-section { margin-bottom: 24px; scroll-margin-top: 130px; }
    .cat-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding-top: 6px;
    }
    .cat-title-row h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--primary);
      white-space: nowrap;
    }
    .cat-title-row .rule { flex: 1; height: 1px; background: var(--border); }

    .cat-note {
      font-size: .73rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 9px;
      padding: 6px 10px;
      background: var(--accent-light);
      border-radius: 6px;
      border-left: 3px solid var(--accent);
    }

    /* ── MENU ITEM CARD ── */
    .menu-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      margin-bottom: 7px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: box-shadow .15s;
    }
    .menu-item:hover { box-shadow: 0 2px 14px var(--shadow); }

    .item-info { flex: 1; min-width: 0; }

    .item-name-primary {
      font-family: 'Playfair Display', serif;
      font-size: .96rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.25;
    }
    .item-name-secondary {
      font-size: .76rem;
      color: var(--muted);
      margin-top: 1px;
    }
    .item-desc {
      font-size: .71rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 3px;
      line-height: 1.45;
    }
    .item-vol {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--secondary);
      margin-top: 4px;
    }

    .item-price { text-align: right; flex-shrink: 0; }
    .price-eur { font-size: 1rem; font-weight: 700; color: var(--primary); }
    .price-bgn { font-size: .73rem; color: var(--muted); margin-top: 2px; }
    .price-na  { font-size: .8rem; color: var(--border); font-style: italic; }

    /* ── FOOTER ── */
    footer {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 16px 32px;
      text-align: center;
      font-size: .7rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      line-height: 1.8;
    }
    footer strong {
      font-family: 'Playfair Display', serif;
      color: var(--primary-mid);
      font-size: .88rem;
    }
  </style>
</head>

// ================================================================
// STATE & UTILS
// ================================================================
let lang = 'bg';

function bgn(eur) {
  return (Math.round(eur * 195.583) / 100).toFixed(2);
}

// ================================================================
// RENDER
// ================================================================
function render() {
  const main    = document.getElementById('main');
  const navEl   = document.getElementById('cat-nav');
  main.innerHTML = '';
  navEl.innerHTML = '';

  MENU.forEach((cat, i) => {
    // ── Nav button
    const btn = document.createElement('button');
    btn.className = 'cnav-btn' + (i === 0 ? ' active' : '');
    btn.dataset.id = cat.id;
    btn.textContent = lang === 'bg' ? cat.bg : cat.en;
    btn.addEventListener('click', () => {
      document.getElementById('sec-' + cat.id)
        .scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    navEl.appendChild(btn);

    // ── Section
    const sec = document.createElement('section');
    sec.className = 'cat-section';
    sec.id = 'sec-' + cat.id;

    // Title row
    const titleRow = document.createElement('div');
    titleRow.className = 'cat-title-row';
    titleRow.innerHTML = `<h2>${lang === 'bg' ? cat.bg : cat.en}</h2><div class="rule"></div>`;
    sec.appendChild(titleRow);

    // Optional note
    if (cat.note) {
      const note = document.createElement('div');
      note.className = 'cat-note';
      note.textContent = lang === 'bg' ? cat.note.bg : cat.note.en;
      sec.appendChild(note);
    }

    // Items
    cat.items.forEach(item => {
      const primaryName   = lang === 'bg' ? item.bg : item.en;
      const secondaryName = lang === 'bg' ? item.en : item.bg;
      const desc = lang === 'bg' ? (item.dbg || '') : (item.den || '');

      const card = document.createElement('div');
      card.className = 'menu-item';
      card.innerHTML = `
        <div class="item-info">
          <div class="item-name-primary">${primaryName}</div>
          <div class="item-name-secondary">${secondaryName}</div>
          ${desc  ? `<div class="item-desc">${desc}</div>` : ''}
          ${item.vol ? `<div class="item-vol">${item.vol}</div>` : ''}
        </div>
        <div class="item-price">
          ${item.eur !== null && item.eur !== undefined
            ? `<div class="price-eur">${item.eur.toFixed(2)} €</div>
               <div class="price-bgn">${bgn(item.eur)} лв.</div>`
            : `<div class="price-na">—</div>`}
        </div>`;
      sec.appendChild(card);
    });

    main.appendChild(sec);
  });

  positionCatNav();
  observeSections();
}

// ================================================================
// STICKY NAV OFFSET
// ================================================================
function positionCatNav() {
  const h = document.getElementById('site-header').offsetHeight;
  document.getElementById('cat-nav-wrap').style.top = h + 'px';
  // update scroll-margin-top on all sections
  const totalSticky = h + document.getElementById('cat-nav-wrap').offsetHeight;
  document.querySelectorAll('.cat-section').forEach(s => {
    s.style.scrollMarginTop = (totalSticky + 8) + 'px';
  });
}

// ================================================================
// INTERSECTION → ACTIVE NAV
// ================================================================
function observeSections() {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const id = e.target.id.replace('sec-', '');
      document.querySelectorAll('.cnav-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.id === id);
      });
      const activeBtn = document.querySelector(`.cnav-btn[data-id="${id}"]`);
      if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    });
  }, { rootMargin: '-35% 0px -60% 0px', threshold: 0 });

  document.querySelectorAll('.cat-section').forEach(s => io.observe(s));
}

// ================================================================
// LANG TOGGLE
// ================================================================
function setLang(l) {
  lang = l;
  document.getElementById('btn-bg').classList.toggle('active', l === 'bg');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  render();
}

// ================================================================
// INIT
// ================================================================
render();
window.addEventListener('resize', positionCatNav);
</script>
