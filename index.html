      --accent:      #C9922A;
      --accent-light:#F0D9A8;
      --text:        #2E1A0E;
      --muted:       #7A6248;
      --border:      #DDD0BB;
      --shadow:      rgba(46,26,14,.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { font-family: "Lato", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    #site-header {
      background: var(--primary); color: #FAF7F2;
      padding: 18px 16px 14px; text-align: center;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 3px 14px rgba(0,0,0,.22);
    }
    #site-header h1 {
      font-family: "Playfair Display", serif;
      font-size: clamp(1.6rem, 5vw, 2rem); font-weight: 700;
      letter-spacing: 3px; line-height: 1.15;
    }
    .tagline { font-size: .68rem; letter-spacing: 3.5px; text-transform: uppercase; color: var(--accent-light); margin-top: 3px; font-weight: 300; }
    .header-row { display: flex; justify-content: center; gap: 10px; margin-top: 11px; }
    .pill-btn { border: 1.5px solid var(--secondary); color: var(--secondary); border-radius: 999px; padding: 5px 18px; font-size: .74rem; font-weight: 700; letter-spacing: 1.2px; transition: background .18s, color .18s, border-color .18s; }
    .pill-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    #cat-nav-wrap { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 199; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    #cat-nav-wrap::-webkit-scrollbar { display: none; }
    #cat-nav { display: flex; gap: 4px; padding: 8px 12px; white-space: nowrap; }
    .cnav-btn { padding: 6px 14px; border-radius: 999px; font-size: .76rem; font-weight: 700; color: var(--muted); transition: background .18s, color .18s; white-space: nowrap; }
    .cnav-btn:hover { background: var(--surface-alt); }
    .cnav-btn.active { background: var(--primary); color: #FAF7F2; }
    main { max-width: 680px; margin: 0 auto; padding: 14px 12px 56px; }
    .cat-section { margin-bottom: 24px; scroll-margin-top: 130px; }
    .cat-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding-top: 6px; }
    .cat-title-row h2 { font-family: "Playfair Display", serif; font-size: 1.15rem; font-weight: 700; color: var(--primary); white-space: nowrap; }
    .cat-title-row .rule { flex: 1; height: 1px; background: var(--border); }
    .cat-note { font-size: .73rem; color: var(--muted); font-style: italic; margin-bottom: 9px; padding: 6px 10px; background: var(--accent-light); border-radius: 6px; border-left: 3px solid var(--accent); }
    .menu-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; margin-bottom: 7px; display: flex; align-items: flex-start; gap: 12px; transition: box-shadow .15s; }
    .menu-item:hover { box-shadow: 0 2px 14px var(--shadow); }
    .item-info { flex: 1; min-width: 0; }
    .item-name-primary { font-family: "Playfair Display", serif; font-size: .96rem; font-weight: 600; color: var(--text); line-height: 1.25; }
    .item-name-secondary { font-size: .76rem; color: var(--muted); margin-top: 1px; }
    .item-desc { font-size: .71rem; color: var(--muted); font-style: italic; margin-top: 3px; line-height: 1.45; }
    .item-vol { font-size: .68rem; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--secondary); margin-top: 4px; }
    .item-price { text-align: right; flex-shrink: 0; }
    .price-eur { font-size: 1rem; font-weight: 700; color: var(--primary); }
    .price-bgn { font-size: .73rem; color: var(--muted); margin-top: 2px; }
    footer { max-width: 680px; margin: 0 auto; padding: 20px 16px 32px; text-align: center; font-size: .7rem; color: var(--muted); border-top: 1px solid var(--border); line-height: 1.8; }
    footer strong { font-family: "Playfair Display", serif; color: var(--primary-mid); font-size: .88rem; }
  </style>
</head>

let lang="bg";
function bgn(e){return(Math.round(e*195.583)/100).toFixed(2);}
function render(){
  const main=document.getElementById("main"),nav=document.getElementById("cat-nav");
  main.innerHTML="";nav.innerHTML="";
  MENU.forEach((cat,i)=>{
    const btn=document.createElement("button");
    btn.className="cnav-btn"+(i===0?" active":"");btn.dataset.id=cat.id;
    btn.textContent=lang==="bg"?cat.bg:cat.en;
    btn.addEventListener("click",()=>document.getElementById("sec-"+cat.id).scrollIntoView({behavior:"smooth",block:"start"}));
    nav.appendChild(btn);
    const sec=document.createElement("section");sec.className="cat-section";sec.id="sec-"+cat.id;
    const tr=document.createElement("div");tr.className="cat-title-row";
    tr.innerHTML="<h2>"+(lang==="bg"?cat.bg:cat.en)+'</h2><div class="rule"></div>';sec.appendChild(tr);
    if(cat.note){const n=document.createElement("div");n.className="cat-note";n.textContent=lang==="bg"?cat.note.bg:cat.note.en;sec.appendChild(n);}
    cat.items.forEach(item=>{
      const p=lang==="bg"?item.bg:item.en,s=lang==="bg"?item.en:item.bg,d=lang==="bg"?(item.dbg||""):(item.den||"");
      const c=document.createElement("div");c.className="menu-item";
      c.innerHTML='<div class="item-info"><div class="item-name-primary">'+p+'</div><div class="item-name-secondary">'+s+'</div>'+(d?'<div class="item-desc">'+d+'</div>':'')+(item.vol?'<div class="item-vol">'+item.vol+'</div>':'')+'</div><div class="item-price"><div class="price-eur">'+item.eur.toFixed(2)+' &euro;</div><div class="price-bgn">'+bgn(item.eur)+' лв.</div></div>';
      sec.appendChild(c);
    });
    main.appendChild(sec);
  });
  positionNav();observeSections();
}
function positionNav(){
  const hh=document.getElementById("site-header").offsetHeight;
  const nw=document.getElementById("cat-nav-wrap");nw.style.top=hh+"px";
  const total=hh+nw.offsetHeight+8;
  document.querySelectorAll(".cat-section").forEach(s=>s.style.scrollMarginTop=total+"px");
}
function observeSections(){
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      const id=e.target.id.replace("sec-","");
      document.querySelectorAll(".cnav-btn").forEach(b=>b.classList.toggle("active",b.dataset.id===id));
      const a=document.querySelector('.cnav-btn[data-id="'+id+'"]');
      if(a)a.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
    });
  },{rootMargin:"-35% 0px -60% 0px",threshold:0});
  document.querySelectorAll(".cat-section").forEach(s=>io.observe(s));
}
function setLang(l){lang=l;document.getElementById("btn-bg").classList.toggle("active",l==="bg");document.getElementById("btn-en").classList.toggle("active",l==="en");render();}
render();window.addEventListener("resize",positionNav);
</script>
</body>
</html>
